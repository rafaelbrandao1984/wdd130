<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="120" height="120">
  <circle cx="100" cy="100" r="95" fill="#0284c7" />
  <!-- Mountains -->
  <polygon points="30,130 70,60 110,130" fill="#0f172a" opacity="0.3" />
  <polygon points="80,130 130,45 180,130" fill="#0f172a" opacity="0.5" />
  <!-- River Waves -->
  <path d="M 20,135 Q 50,115 80,135 T 140,135 T 180,135" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
  <path d="M 10,155 Q 45,135 80,155 T 150,155 T 190,155" fill="none" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" />
  <!-- Cross Paddles -->
  <line x1="60" y1="60" x2="140" y2="140" stroke="#f97316" stroke-width="6" stroke-linecap="round" />
  <line x1="140" y1="60" x2="60" y2="140" stroke="#f97316" stroke-width="6" stroke-linecap="round" />
  <ellipse cx="55" cy="55" rx="10" ry="16" fill="#f97316" transform="rotate(-45 55 55)" />
  <ellipse cx="145" cy="55" rx="10" ry="16" fill="#f97316" transform="rotate(45 145 55)" />
  <!-- Text ring / banner -->
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">WWR</text>
</svg>
